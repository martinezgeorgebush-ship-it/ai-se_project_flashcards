<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevDeck</title>
    <meta name="author" content="Jorge Martinez" />
    <meta
      name="description"
      content="Interactive flashcards to help developers learn and remember software engineering terms"
    />
    <meta
      name="keywords"
      content="learning material, study aids, flashcards, learning materials"
    />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="assets/vendor/normalize.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">flashcards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="#home" class="nav__link">My Decks</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="home" class="decks">
        <h2 class="decks__title">My Decks</h2>
        <ul class="decks__list">
          <template id="deck-template">
            <li class="deck deck_color_green">
              <a href="#" class="deck__link"></a>
              <h2 class="deck__title"></h2>
              <div class="deck__row">
                <p class="deck__count"></p>
                <button
                  class="deck__delete-btn"
                  type="button"
                  aria-label="Delete this Deck"
                >
                  <img src="assets/images/delete.svg" alt="delete" />
                </button>
              </div>
            </li>
          </template>
        </ul>
        <button class="decks__new-deck-btn">+ New Deck</button>
      </section>
      <section id="not-found" class="not-found" style="display: none">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>
      <section id="carousel" class="carousel" style="display: none">
        <h2 class="carousel__title"></h2>
        <div class="carousel__card">
          <p class="carousel__card-text"></p>
        </div>
        <button
          class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
          type="button"
          aria-label="Previous card"
        >
          <img src="assets/images/left.svg" alt="Previous" />
        </button>
        <button
          class="carousel__btn carousel__btn_type_right"
          type="button"
          aria-label="Next Card"
        >
          <img src="assets/images/right.svg" alt="Next" />
        </button>
        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="Flip card"
        >
          <img src="assets/images/flip.svg" alt="flip" />
        </button>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Jorge Martinez</p>
    </footer>
    <script type="module" src="assets/js/index.js"></script>
  </body>
</html>
